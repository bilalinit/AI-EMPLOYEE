# Docker Compose for Odoo Community 19 + PostgreSQL 15
# Personal AI Employee - Gold Tier Accounting Integration
version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: odoo_postgres
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: odoo
      POSTGRES_PASSWORD: odoo_password
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - odoo-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U odoo"]
      interval: 10s
      timeout: 5s
      retries: 5

  odoo:
    image: odoo:19.0
    container_name: odoo_web
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8069:8069"
    environment:
      HOST: postgres
      PORT: 5432
      USER: odoo
      PASSWORD: odoo_password
    volumes:
      - odoo-data:/var/lib/odoo
      - ./odoo-addons:/mnt/extra-addons
      - ./odoo-config:/etc/odoo
    networks:
      - odoo-network
    restart: unless-stopped
    command: --
      --database=odoo
      --db-filter=^odoo$$
      --data-dir=/var/lib/odoo
      --addons-path=/mnt/addons,/mnt/extra-addons
      --http-port=8069
      --log-level=info

volumes:
  postgres-data:
    driver: local
  odoo-data:
    driver: local

networks:
  odoo-network:
    driver: bridge
